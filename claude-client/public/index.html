<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #chat { width: 100%; max-width: 640px; height: 90vh; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.12); display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .user { align-self: flex-end; background: #0b93f6; color: #fff; border-bottom-right-radius: 4px; }
  .claude { align-self: flex-start; background: #e5e5ea; color: #000; border-bottom-left-radius: 4px; }
  .thinking { color: #888; font-style: italic; }
  #bar { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e0e0e0; }
  #prompt { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 22px; font-size: 15px; outline: none; resize: none; }
  #prompt:focus { border-color: #0b93f6; }
  button { padding: 10px 20px; background: #0b93f6; color: #fff; border: none; border-radius: 22px; font-size: 15px; cursor: pointer; }
  button:disabled { background: #aaa; cursor: default; }
</style>
</head>
<body>
<div id="chat">
  <div id="messages"></div>
  <div id="bar">
    <textarea id="prompt" rows="1" placeholder="Ask Claude…"></textarea>
    <button id="send">Send</button>
  </div>
</div>
<script>
  const messages = document.getElementById('messages');
  const prompt = document.getElementById('prompt');
  const send = document.getElementById('send');

  function addBubble(text, cls) {
    const div = document.createElement('div');
    div.className = 'bubble ' + cls;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function ask() {
    const text = prompt.value.trim();
    if (!text) return;
    prompt.value = '';
    send.disabled = true;
    addBubble(text, 'user');
    const thinking = addBubble('Thinking…', 'claude thinking');
    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text }),
      });
      const data = await res.json();
      thinking.className = 'bubble claude';
      thinking.textContent = data.result ?? data.error ?? 'No response';
    } catch (e) {
      thinking.className = 'bubble claude';
      thinking.textContent = 'Error: ' + e.message;
    }
    send.disabled = false;
    prompt.focus();
  }

  send.addEventListener('click', ask);
  prompt.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
  });
</script>
</body>
</html>
